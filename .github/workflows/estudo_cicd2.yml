name: workflow para node
on: push
#on serve para definir o que vai triggar a pipeline
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
  deploy:
    needs: test
    #defini que um job so vai executar depois do outro
    runs-on: ubuntu-latest
    #cada job tem seu proprio runner, o que permite isolamento
    #os dois jobs são executados em paralelo
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: build project
        run: npm run build
      - name: Deploy
        run: echo "Deploying ..."
  
